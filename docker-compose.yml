services:
  iptv-manager:
    build:
      context: /appdata/iptv-manager   # ruta del contenedor donde subiste el código
    container_name: iptv-manager
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - TZ=Europe/Madrid
      - IPTV_DATA_DIR=/data
    volumes:
      # Config y M3U persistentes
      - /mnt/user/appdata/iptv-manager/data:/data
      # Share multimedia para que escriba el M3U de Jellyfin
      - /mnt/user/multimedia/m3u:/mnt/m3u
